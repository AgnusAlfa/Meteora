<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito | METEORA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold font-orbitron" href="index.html">METEORA</a>
            <a class="btn btn-outline-info" href="index.html">Seguir comprando</a>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="font-orbitron text-info mb-4">Tu Carrito Estelar</h1>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="table-responsive bg-black p-3 rounded border border-secondary">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="items-carrito">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card bg-black border-info text-white p-4 shadow-lg">
                    <h3 class="font-orbitron h4 mb-4">Resumen</h3>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Total:</span>
                        <span class="fs-3 fw-bold text-info" id="precio-total">$0</span>
                    </div>
                    <button class="btn btn-primary w-100 btn-lg" onclick="finalizarCompra()">Finalizar Compra</button>
                    <button class="btn btn-outline-danger w-100 mt-3" onclick="vaciarCarrito()">Vaciar Carrito</button>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/carrito.js"></script>
    <script>
        // Invocamos la función de renderizado cuando la página cargue
        document.addEventListener('DOMContentLoaded', renderizarTablaCarrito);
    </script>
</body>
</html>
